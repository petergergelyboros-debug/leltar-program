<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Raktárkezelő Központ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="clock-container">
            <span id="date"></span>
            <span id="clock"></span>
        </div>
        <div class="logo-area">
            <h1>📦 Raktárkezelő Központ</h1>
        </div>
    </header>

    <main class="grid-container">
        <div class="card">🛠️ Eszközök</div>
        <div class="card">⚙️ Alkatrészek</div>
        <div class="card">✏️ Irodaszer</div>
        <div class="card">🪑 Bútorok</div>
        <div class="card">💻 Elektronika</div>
        <div class="card">📦 Egyéb</div>
    </main>

    <script src="script.js"></script>
</body>
</html>
